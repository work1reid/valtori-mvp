<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valtori AI - Sales Call Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #141824;
            --bg-tertiary: #1a1f2e;
            
            --accent-cyan: #00f5ff;
            --accent-green: #00ff88;
            
            --text-primary: #e8ecf8;
            --text-secondary: #8b93b0;
            --text-tertiary: #5a6279;
            
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-medium: rgba(255, 255, 255, 0.12);
            
            --glow-cyan: 0 0 30px rgba(0, 245, 255, 0.3);
        }
        
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 600px;
            text-align: center;
            position: relative;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
        
        .logo {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tagline {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            font-weight: 500;
        }
        
        .signup-form {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2rem;
        }
        
        .form-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: block;
            font-weight: 600;
        }
        
        .email-input {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.1rem;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-medium);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .email-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }
        
        .submit-button {
            width: 100%;
            padding: 1.3rem;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            color: var(--bg-primary);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .submit-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 245, 255, 0.4);
        }
        
        .submit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            display: none;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
        }
        
        .message.error {
            background: rgba(255, 51, 102, 0.15);
            border: 1px solid #ff3366;
            color: #ff3366;
        }
        
        .privacy-note {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            line-height: 1.5;
        }
        
        .features-mini {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 3rem;
            flex-wrap: wrap;
        }
        
        .feature-mini {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
        
        .feature-mini-icon {
            font-size: 1.3rem;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .tagline { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📞</div>
        <h1>Master Cold Calling.<br><span class="gradient-text">Practice With AI.</span></h1>
        <p class="tagline">Real-time voice conversations. Instant performance analytics. Get better at sales.</p>
        
        <div class="signup-form">
            <div class="message" id="message"></div>
            
            <label class="form-label">Enter your email to try the demo</label>
            <input 
                type="email" 
                class="email-input" 
                id="emailInput" 
                placeholder="your@email.com"
                required
            />
            <button class="submit-button" id="submitBtn" onclick="handleSignup()">
                Start Free Demo
            </button>
        </div>
        
        <p class="privacy-note">
            By continuing, you agree to receive product updates. We respect your privacy.
        </p>
        
        <div class="features-mini">
            <div class="feature-mini">
                <span class="feature-mini-icon">🎤</span>
                <span>Real Voice AI</span>
            </div>
            <div class="feature-mini">
                <span class="feature-mini-icon">📊</span>
                <span>Instant Analytics</span>
            </div>
            <div class="feature-mini">
                <span class="feature-mini-icon">⚡</span>
                <span>2 Min Demo</span>
            </div>
        </div>
    </div>

    <script>
        // Initialize Supabase
        const SUPABASE_URL = 'https://aqzjxlxdjhegypnhsdcp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxemp4bHhkamhlZ3lwbmhzZGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxMzk2OTYsImV4cCI6MjA4MDcxNTY5Nn0.oNwuIyrqwNAA4PfT4Nxgm869d6nKMZseFLJQAkJxbNM';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function handleSignup() {
            const emailInput = document.getElementById('emailInput');
            const submitBtn = document.getElementById('submitBtn');
            const message = document.getElementById('message');
            const email = emailInput.value.trim();
            
            // Validate email
            if (!email || !email.includes('@')) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            
            try {
                // Sign up with Supabase
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: generateRandomPassword(),
                    options: {
                        emailRedirectTo: `${window.location.origin}/call.html`
                    }
                });
                
                if (error) throw error;
                
                // Store email in localStorage
                localStorage.setItem('valtoriEmail', email);
                
                // Also store in database table
                await supabase.from('users').insert([
                    { email: email, created_at: new Date().toISOString() }
                ]);
                
                // Show success message
                showMessage('✅ Account created! Redirecting to demo...', 'success');
                
                // Redirect to call page
                setTimeout(() => {
                    window.location.href = 'call.html';
                }, 1500);
                
            } catch (error) {
                console.error('Signup error:', error);
                showMessage('Error: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Start Free Demo';
            }
        }
        
        function generateRandomPassword() {
            return Math.random().toString(36).slice(-12) + Math.random().toString(36).slice(-12);
        }
        
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type} show`;
        }
        
        // Allow Enter key to submit
        document.getElementById('emailInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleSignup();
            }
        });
        
        // Check if already logged in
        window.addEventListener('load', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'call.html';
            }
        });
    </script>
</body>
</html>
